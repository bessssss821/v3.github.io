<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学长团纪律股智能排班系统 v14.0</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --jr: #0056b3; --sr: #7b1fa2; }
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; padding-bottom: 220px; color: #333; margin: 0; }
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; max-width: 650px; margin: 15px auto; }
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; }
        .cycle-bar { padding: 10px; text-align: center; font-weight: bold; color: white; line-height: 1.5; }
        .date-input { font-size: 13px; font-weight: normal; border: 1px dashed rgba(255,255,255,0.5); padding: 2px 8px; border-radius: 4px; display: inline-block; cursor: text; margin-top: 5px; }
        .day-section { padding: 15px; border-bottom: 10px solid #f4f7f6; }
        .day-title { font-size: 18px; font-weight: bold; color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 5px; margin-bottom: 15px; }
        .shift-block { margin-bottom: 20px; border: 1px solid #e0e0e0; border-radius: 10px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
        th { background: #f8f9fa; text-align: left; padding: 10px; border-bottom: 1px solid #eee; width: 45%; color: #666; font-weight: bold; }
        td { padding: 10px; border-bottom: 1px solid #eee; vertical-align: middle; }
        .editable { background: #fff; padding: 4px; min-height: 18px; outline: none; border: 1px solid transparent; display: inline-block; width: 95%; }
        .merge-tip { font-size: 11px; color: #e67e22; font-weight: bold; display: block; margin-top: 2px; }
        .type-tag { font-size: 9px; color: #aaa; margin-right: 4px; border: 1px solid #ddd; padding: 1px 3px; border-radius: 3px; font-weight: normal; }
        .controls { position: fixed; bottom: 0; left: 0; right: 0; padding: 15px; background: white; border-top: 1px solid #ddd; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-width: 650px; margin: auto; }
        button { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-next { background: var(--accent); color: white; grid-column: span 2; margin-bottom: 5px; font-size: 16px; }
        .btn-copy { background: #34b7f1; color: white; }
        .btn-leave { background: #95a5a6; color: white; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2 style="margin:0">纪律股岗位分布表</h2>
        <div id="date-range" class="date-input" contenteditable="true" onblur="saveDate(this)">点击设置有效期</div>
    </div>
    <div id="cycle-bar" class="cycle-bar"></div>
    <div id="main-content"></div>
</div>

<div class="controls">
    <div class="btn-group">
        <button class="btn-next" onclick="nextCycle()">🔄 切换周期 (执行类型避重轮换)</button>
        <button class="btn-copy" onclick="copyToWhatsApp()">📋 复制通知</button>
        <button class="btn-leave" onclick="manageLeave()">🚩 请假管理</button>
    </div>
</div>

<script>
const teamData = {
    1: { jr: ["林语煊(队长)", "洪凱绮", "叶抒澔", "彭宇谦", "颜敬馨", "陈盈彤", "李苡瑈", "叶欣霖", "许佳恩"], sr: ["洪于忠", "李乐萱", "鍾楗伟", "刘雨宁"] },
    2: { jr: ["林裕涵(队长)", "郑敬耀", "吴旭恒", "黄研喆", "彭皓雯", "罗亦晴", "游芷芊", "余芷晴"], sr: ["叶渝恬", "江蕙莉", "许悦", "王彦予"] },
    3: { jr: ["王苡洁(队长)", "黄心莲", "黄杰隆", "李同伊", "杨振誉", "杨卉", "孙巧恩", "江靖瑄", "江玮恒"], sr: ["李家莹", "谢霈怡", "徐欣仪", "陈慧瑾", "陈乐慈"] },
    4: { jr: ["林妍芯(队长)", "林敬钦", "林楀涵", "周芷妤", "李祥立", "郑芯甜", "彭诗惠", "刘俞萱", "吕乐萱"], sr: ["吴旭弘", "陈子宇", "郑宇哲", "王彦心", "杨雯璇"] }
};

const stations = [
    { name: "大食堂总巡", type: 1, limit: 1 },
    { name: "小食堂总巡", type: 1, limit: 1, merge: "+ 兼顾左国字楼梯口" },
    { name: "巡国字楼", type: 3, limit: 2 },
    { name: "巡教学楼", type: 3, limit: 2 },
    { name: "巡科技楼", type: 3, limit: 2 },
    { name: "9号水档", type: 2, limit: 1 },
    { name: "7号糕档+8号水档", type: 2, limit: 1 },
    { name: "6号素食档", type: 2, limit: 1 },
    { name: "5号饭档", type: 2, limit: 1 },
    { name: "4号面档", type: 2, limit: 1 },
    { name: "3号面档", type: 2, limit: 1 },
    { name: "2号饭档", type: 2, limit: 1 },
    { name: "科技底楼", type: 4, limit: 1 },
    { name: "礼堂后楼梯口", type: 4, limit: 1 },
    { name: "右国字楼梯口", type: 4, limit: 1 },
    { name: "左国字楼梯口", type: 4, limit: 1 },
    { name: "教学楼梯口", type: 4, limit: 1 }
];

const cycles = [
    { name: "第一次岗位", color: "#e67e22", mon: {b1:1, b2:2}, tue: {b1:3, b2:4} },
    { name: "第二次岗位", color: "#2980b9", mon: {b1:4, b2:1}, tue: {b1:2, b2:3} },
    { name: "第三次岗位", color: "#8e44ad", mon: {b1:3, b2:4}, tue: {b1:1, b2:2} },
    { name: "第四次岗位", color: "#c0392b", mon: {b1:2, b2:3}, tue: {b1:4, b2:1} }
];

let curIdx = parseInt(localStorage.getItem('v14_idx')) || 0;
let userDrafts = JSON.parse(localStorage.getItem('v14_drafts')) || {};
let leaveList = JSON.parse(localStorage.getItem('v14_leave')) || [];
let savedDate = localStorage.getItem('v14_date') || "点击设置日期";
let lastTypeMap = JSON.parse(localStorage.getItem('v14_type_map')) || {}; // 记录每个人上期的类型

function autoAssign(teamKey, mode) {
    let pool = (mode === 'jr') ? [...teamData[teamKey].jr] : (mode === 'sr') ? [...teamData[teamKey].sr] : [...teamData[teamKey].sr, ...teamData[teamKey].jr];
    pool = pool.filter(n => !leaveList.includes(n));

    let result = {};
    let assignedNames = new Set();

    // 核心逻辑：按类型顺序分配，但每个人在分配时，会避开上期做过的类型
    const getAvailable = (targetType) => {
        // 将上期做过该类型的人排到最后
        return pool.filter(n => !assignedNames.has(n)).sort((a, b) => {
            let aWasSame = lastTypeMap[a] === targetType ? 1 : 0;
            let bWasSame = lastTypeMap[b] === targetType ? 1 : 0;
            return aWasSame - bWasSame;
        });
    };

    stations.forEach(st => {
        let candidates = getAvailable(st.type);
        if (candidates.length > 0) {
            let count = (st.limit === 2 && candidates.length >= 2) ? 2 : 1;
            let chosen = candidates.slice(0, count);
            result[st.name] = chosen;
            chosen.forEach(name => {
                assignedNames.add(name);
                lastTypeMap[name] = st.type; // 更新本期类型供下期参考
            });
        } else {
            result[st.name] = ["-"];
        }
    });

    localStorage.setItem('v14_type_map', JSON.stringify(lastTypeMap));
    return result;
}

function render() {
    const config = cycles[curIdx];
    document.getElementById('cycle-bar').innerText = config.name;
    document.getElementById('cycle-bar').style.background = config.color;
    document.getElementById('date-range').innerText = savedDate;
    const container = document.getElementById('main-content');
    container.innerHTML = '';

    const layouts = [
        { label: "一三五 一休", t: config.mon.b1, m: 'all', id: 'm1' },
        { label: "一三五 初中二休", t: config.mon.b2, m: 'jr', id: 'm2j' },
        { label: "一三五 高中二休", t: config.mon.b2, m: 'sr', id: 'm2s' },
        { label: "二四 一休", t: config.tue.b1, m: 'all', id: 't1' },
        { label: "二四 初中二休", t: config.tue.b2, m: 'jr', id: 't2j' },
        { label: "二四 高中二休", t: config.tue.b2, m: 'sr', id: 't2s' }
    ];

    layouts.forEach(l => {
        let assigned = autoAssign(l.t, l.m);
        let rows = stations.map(st => {
            const cid = `${curIdx}_${l.id}_${st.name}`;
            let names = userDrafts[cid] || assigned[st.name].join(", ");
            return `<tr><th><span class="type-tag">${st.type}</span>${st.name}</th><td><div class="editable" contenteditable="true" onblur="saveEdit('${cid}',this)">${names}</div>${(names!=="-"&&st.merge)?`<span class="merge-tip">${st.merge}</span>`:""}</td></tr>`;
        }).join('');
        container.innerHTML += `<div class="day-section"><div class="day-title">${l.label} (第${l.t}队)</div><div class="shift-block"><table>${rows}</table></div></div>`;
    });
}

function saveEdit(id, el) { userDrafts[id] = el.innerText.trim(); localStorage.setItem('v14_drafts', JSON.stringify(userDrafts)); }
function saveDate(el) { savedDate = el.innerText; localStorage.setItem('v14_date', savedDate); }
function nextCycle() { curIdx = (curIdx + 1) % cycles.length; localStorage.setItem('v14_idx', curIdx); render(); window.scrollTo(0,0); }
function copyToWhatsApp() { alert("通知模板已复制到剪贴板！"); }
function manageLeave() { let n = prompt("输入请假姓名(逗号隔开):", leaveList.join(',')); if(n!==null){ leaveList=n.split(',').map(s=>s.trim()).filter(s=>s!==""); localStorage.setItem('v14_leave',JSON.stringify(leaveList)); render(); } }

render();
</script>
</body>
</html>
